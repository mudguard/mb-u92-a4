<!DOCTYPE html>
<html lang="en" style="background-color: #5f6368;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kitchn Edwards</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#5f6368">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kitchn">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1027/1027128.png">

  <style>
    body, html { 
      margin: 0; padding: 0; 
      height: 100%; width: 100%; 
      overflow: hidden; 
      background-color: #5f6368 !important; /* Grey background */
    }

    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #5f6368; /* Grey background */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }

    .brand-text {
      color: #1a1c23; /* Dark Navy text */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 1.2rem;
      font-weight: 400; /* Bumped slightly so it's readable on grey */
      letter-spacing: 3px;
      text-transform: uppercase;
      margin: 15px 0 0 0;
    }

    /* ... rest of your pulse and iframe CSS remains the same ... */
    #loading-screen img { width: 85px; height: 85px; }
    .pulse-container { display: flex; flex-direction: column; align-items: center; animation: pulse 2s infinite ease-in-out; }
    @keyframes pulse { 0% { transform: scale(0.98); opacity: 0.7; } 50% { transform: scale(1.02); opacity: 1; } 100% { transform: scale(0.98); opacity: 0.7; } }
    iframe { border: none; width: 100%; height: 100%; display: block; }
  </style>
</head>
<body style="background-color: #5f6368;"> <div id="loading-screen">
    <div class="pulse-container">
      <img src="https://cdn-icons-png.flaticon.com/512/1027/1027128.png">
      <p class="brand-text">Kitchn Edwards</p>
    </div>
  </div>

  <iframe id="app-frame" src="https://script.google.com/macros/s/AKfycby4I8XGdE1ZMeQrJO43wG2_qm40lOquTNX6VSOhHaVS-I99l-1pQZU2IS6-fMfd1hTv/exec"></iframe>

  <script>
  if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    window.addEventListener('load', function() {
      setTimeout(function() {
        const loader = document.getElementById('loading-screen');
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.style.display = 'none';
        }, 600);
      }, 2500); 
    });
  </script>
</body>
</html>
