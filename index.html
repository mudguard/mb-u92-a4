<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Kitchn Edwards</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1F2937">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kitchn">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1027/1027128.png">

  <style>
    /* 1. Base Reset - Using dynamic height (dvh) */
    html, body { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      height: 100dvh; /* The magic fix for mobile browser bars */
      overflow: hidden; /* Locks the wrapper so it NEVER scrolls */
      background-color: #1F2937 !important; 
    }

    /* 2. Loading Screen */
    #loading-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #1F2937; 
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }

    #loading-screen img { 
      width: 140px; 
      height: 140px; 
      margin-bottom: -15px; 
    }

    .brand-text {
      color: #000000; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 1.30rem;
      font-weight: 900; 
      letter-spacing: 3px;
      text-transform: uppercase;
      margin: 15px 0 0 0;
    }

    .pulse-container { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      animation: pulse 2s infinite ease-in-out; 
    }

    @keyframes pulse { 
      0% { transform: scale(0.97); opacity: 0.8; } 
      50% { transform: scale(1.03); opacity: 1; } 
      100% { transform: scale(0.97); opacity: 0.8; } 
    }

    /* 3. The Iframe - Fixed to respect the dynamic boundaries */
    iframe {
      border: none;
      width: 100%;
      height: 100%; /* Matches the body's safe dimensions perfectly */
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      overflow: hidden; 
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="pulse-container">
      <img src="https://cdn-icons-png.flaticon.com/512/1027/1027128.png">
      <p class="brand-text">Kitchn Edwards</p>
    </div>
  </div>

  <iframe id="app-frame" src="https://script.google.com/macros/s/AKfycby4I8XGdE1ZMeQrJO43wG2_qm40lOquTNX6VSOhHaVS-I99l-1pQZU2IS6-fMfd1hTv/exec"></iframe>
  
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
    }

    window.addEventListener('load', function() {
      setTimeout(function() {
        const loader = document.getElementById('loading-screen');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => { loader.style.display = 'none'; }, 600);
        }
      }, 3500); 
    });
  </script>
</body>
</html>
